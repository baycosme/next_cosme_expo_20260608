<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ヒット化粧品の方程式 — NEXT COSMETIC EXPO 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fbf6f2;
  --bg-soft: #f5e8e2;
  --white: #ffffff;
  --ink: #1f1815;
  --ink-mid: #4a3d38;
  --ink-soft: #6b5a52;
  --accent: #b04a5e;
  --accent-hover: #8e3548;
  --accent-deep: #6e2436;
  --accent-bg: #f9eef0;
  --gold: #b08850;
  --rose: #e0a8b3;
  --rose-soft: #f4dde2;
  --border: #e0c7c0;
  --border-light: #ede0db;
  --sans: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  --serif: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
  --display: 'Cormorant Garamond', 'Noto Serif JP', serif;
  --max: 920px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); line-height: 1.85; font-size: 16px; -webkit-font-smoothing: antialiased; font-weight: 400; letter-spacing: 0.02em; }
a { color: inherit; text-decoration: none; }
button { font: inherit; background: none; border: 0; color: inherit; cursor: pointer; }
img { max-width: 100%; display: block; }

/* subtle floral background pattern */
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background:
    radial-gradient(circle at 10% 20%, rgba(232,197,204,0.18) 0%, transparent 40%),
    radial-gradient(circle at 90% 60%, rgba(245,225,230,0.25) 0%, transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(201,169,106,0.08) 0%, transparent 40%);
}

/* ── topbar ─────────────────────────── */
.topbar { position: sticky; top: 0; z-index: 100; background: rgba(253,248,245,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light); }
.topbar__inner { max-width: 1100px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
.topbar__brand { display: flex; align-items: center; gap: 10px; font-family: var(--display); font-size: 17px; font-weight: 500; letter-spacing: 0.08em; color: var(--accent-deep); font-style: italic; }
.topbar__brand::before { content: "❦"; color: var(--gold); font-size: 14px; font-style: normal; }
.topbar__nav { display: flex; gap: 24px; align-items: center; font-size: 13px; }
.topbar__nav a { color: var(--ink-soft); transition: color 0.2s; font-weight: 500; }
.topbar__nav a:hover { color: var(--accent); }
.topbar__cta { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%); color: #fff !important; padding: 10px 22px; border-radius: 999px; font-weight: 500; box-shadow: 0 4px 14px rgba(184,106,122,0.25); }
.topbar__cta:hover { box-shadow: 0 6px 20px rgba(184,106,122,0.35); transform: translateY(-1px); }

/* ── hero (KV image) ─────────────────────────── */
.hero { max-width: 1100px; margin: 0 auto; padding: 32px 24px 0; }
.hero__kv { width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(184,106,122,0.15), 0 4px 20px rgba(58,42,40,0.06); position: relative; }
.hero__kv::after { content: ""; position: absolute; inset: 0; border-radius: 16px; pointer-events: none; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4); }
.hero__kv img { width: 100%; height: auto; display: block; }
.hero__cta-row { display: flex; gap: 14px; justify-content: center; margin-top: 36px; flex-wrap: wrap; }

/* decorative ornament */
.ornament { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 24px 0 8px; color: var(--gold); }
.ornament::before, .ornament::after { content: ""; width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
.ornament__mark { font-size: 14px; letter-spacing: 0.4em; }


.hero__info { max-width: 1100px; margin: 28px auto 0; padding: 0 24px; }
.hero__info-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.hero__info-cell { padding: 18px 20px; text-align: center; border-right: 1px solid var(--border-light); }
.hero__info-cell:last-child { border-right: 0; }
.hero__info-l { font-family: var(--display); font-style: italic; font-size: 11px; color: var(--gold); letter-spacing: 0.16em; margin-bottom: 4px; font-weight: 600; }
.hero__info-v { font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--ink); letter-spacing: 0.04em; }
.hero__info-v small { display: block; font-family: var(--sans); font-size: 11px; color: var(--ink-soft); margin-top: 2px; font-weight: 400; }
@media (max-width: 800px) {
  .hero__info-grid { grid-template-columns: 1fr 1fr; }
  .hero__info-cell { padding: 14px 12px; }
  .hero__info-cell:nth-child(2n) { border-right: 0; }
  .hero__info-cell:nth-child(1), .hero__info-cell:nth-child(2) { border-bottom: 1px solid var(--border-light); }
}

/* ── btn ─────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; border-radius: 999px; font-size: 14px; font-weight: 500; letter-spacing: 0.04em; transition: all 0.25s; }
.btn--primary { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%); color: #fff; box-shadow: 0 6px 20px rgba(184,106,122,0.3); }
.btn--primary:hover { box-shadow: 0 10px 28px rgba(184,106,122,0.4); transform: translateY(-2px); }
.btn--primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn--ghost { background: var(--white); color: var(--accent-deep); border: 1px solid var(--border); }
.btn--ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--rose-soft); }
.btn--outline { background: transparent; color: var(--accent-deep); border: 1px solid var(--border); padding: 10px 22px; font-size: 13px; }
.btn--outline:hover { border-color: var(--accent); color: var(--accent); background: var(--rose-soft); }

/* ── section common ─────────────────────────── */
.section { max-width: var(--max); margin: 0 auto; padding: 80px 24px 0; }
.section__head { text-align: center; margin-bottom: 48px; }
.section__kicker { font-family: var(--display); font-style: italic; font-size: 15px; color: var(--gold); letter-spacing: 0.16em; margin-bottom: 8px; display: block; font-weight: 500; }
.section__title { font-family: var(--serif); font-size: 30px; font-weight: 600; line-height: 1.45; letter-spacing: 0.04em; color: var(--ink); }
.section__title-accent { color: var(--accent); }
.section__lead { font-size: 15px; color: var(--ink-mid); margin-top: 20px; line-height: 1.95; max-width: 620px; margin-left: auto; margin-right: auto; }
.section__sub { font-size: 14px; color: var(--ink-soft); margin-top: 14px; line-height: 1.8; letter-spacing: 0.04em; }
.section__divider { width: 60px; height: 1px; background: var(--gold); margin: 18px auto 0; position: relative; }
.section__divider::before { content: "\2766"; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--bg); padding: 0 10px; color: var(--gold); font-size: 11px; }

/* ── lead ─────────────────────────── */
.lead { max-width: var(--max); margin: 0 auto; padding: 72px 24px 32px; }
.lead__text { font-size: 16px; line-height: 2; text-align: center; max-width: 720px; margin: 0 auto; color: var(--ink); }
.lead__text p { margin-bottom: 22px; }
.lead__text strong { color: var(--accent-deep); font-weight: 600; border-bottom: 1px solid var(--rose); padding-bottom: 1px; }

/* ── target ─────────────────────────── */
.target { background: linear-gradient(180deg, var(--white) 0%, var(--rose-soft) 100%); border: 1px solid var(--border); border-radius: 16px; padding: 44px 40px; box-shadow: 0 4px 24px rgba(176,74,94,0.06); }
.target__title { font-family: var(--serif); font-size: 19px; font-weight: 600; margin-bottom: 28px; text-align: center; color: var(--accent-deep); letter-spacing: 0.06em; }
.target__title::before, .target__title::after { content: " \273F "; color: var(--gold); font-size: 14px; }
.target__list { list-style: none; display: flex; flex-direction: column; gap: 16px; max-width: 580px; margin: 0 auto; }
.target__list li { display: flex; gap: 14px; align-items: baseline; font-size: 15px; line-height: 1.75; color: var(--ink); }
.target__list li::before { content: "\273F"; color: var(--accent); font-size: 13px; flex-shrink: 0; }

/* ── benefits ─────────────────────────── */
.benefits__list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
.benefit { position: relative; display: flex; flex-direction: column; padding: 36px 28px 28px; background: var(--white); border: 1px solid var(--border-light); border-radius: 16px; transition: all 0.3s; overflow: hidden; }
.benefit:hover { border-color: var(--rose); box-shadow: 0 16px 40px rgba(176,74,94,0.12); transform: translateY(-3px); }
.benefit::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, var(--gold), var(--rose), var(--gold)); opacity: 0.6; transition: opacity 0.3s; }
.benefit:hover::before { opacity: 1; }

.benefit__head { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px dashed var(--border-light); }

.benefit__icon { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--rose-soft) 0%, var(--accent-bg) 100%); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(176,136,80,0.25); }
.benefit__icon svg { width: 28px; height: 28px; color: var(--accent); }

.benefit__num { font-family: var(--display); font-style: italic; font-size: 32px; font-weight: 600; color: var(--accent); line-height: 1; letter-spacing: -0.01em; }
.benefit__num small { font-size: 10px; font-style: normal; color: var(--gold); display: block; margin-top: 4px; letter-spacing: 0.18em; font-weight: 700; line-height: 1.2; max-width: 80px; }

.benefit__body { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.benefit__t { font-family: var(--serif); font-weight: 600; font-size: 17px; color: var(--ink); line-height: 1.5; letter-spacing: 0.02em; }
.benefit__b { font-size: 13.5px; color: var(--ink-mid); line-height: 1.85; flex: 1; }
.benefit__tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.benefit__tag { font-size: 10.5px; font-weight: 500; padding: 4px 10px; background: var(--rose-soft); color: var(--accent-deep); border-radius: 999px; letter-spacing: 0.04em; }

/* ── speakers ─────────────────────────── */
.speakers__grid { display: flex; flex-direction: column; gap: 28px; }
.speaker { display: flex; gap: 36px; padding: 40px 36px; background: var(--white); border: 1px solid var(--border-light); border-radius: 16px; box-shadow: 0 4px 24px rgba(184,106,122,0.06); position: relative; overflow: hidden; align-items: flex-start; }
.speaker__photo-wrap { padding-top: 8px; }
.speaker::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(to right, var(--rose), var(--gold), var(--rose)); }
.speaker__photo-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0; }
.speaker__photo { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; background: var(--rose-soft); position: relative; box-shadow: 0 8px 24px rgba(176,74,94,0.12); border: 3px solid var(--white); outline: 1px solid var(--rose); outline-offset: 4px; }
.speaker__photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.speaker__photo--takeoka img { object-position: center 15%; }
.speaker__photo--ishii img { object-position: center 25%; }
.speaker__badge { font-family: var(--display); font-style: italic; font-size: 13px; color: var(--gold); letter-spacing: 0.16em; font-weight: 600; }
.speaker__info { flex: 1; }
.speaker__role { font-size: 12px; color: var(--accent); margin-bottom: 8px; letter-spacing: 0.06em; font-weight: 600; }
.speaker__name { font-family: var(--serif); font-size: 26px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.04em; color: var(--ink); }
.speaker__name-en { font-family: var(--display); font-style: italic; font-size: 14px; color: var(--gold); margin-bottom: 18px; letter-spacing: 0.08em; font-weight: 500; }
.speaker__bio { font-size: 14px; line-height: 1.9; color: var(--ink-mid); margin-bottom: 18px; }
.speaker__highlights { list-style: none; display: flex; flex-direction: column; gap: 8px; padding: 16px 20px; background: var(--rose-soft); border-radius: 8px; border-left: 3px solid var(--gold); }
.speaker__highlights li { font-size: 13px; color: var(--ink); padding-left: 20px; position: relative; line-height: 1.7; }
.speaker__highlights li::before { content: "\2726"; position: absolute; left: 0; color: var(--gold); font-size: 11px; top: 5px; }
.speaker__more { margin-top: 16px; }


.program__hook { display: block; font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 12px; line-height: 1; }
/* ── program ─────────────────────────── */
.program__list { border-top: 1px solid var(--gold); }
.prog { border-bottom: 1px solid var(--border-light); transition: background 0.2s; }
.prog__head { width: 100%; display: grid; grid-template-columns: 130px 1fr; gap: 20px; padding: 26px 100px 26px 20px; align-items: center; text-align: left; position: relative; }
.prog--session .prog__head { cursor: pointer; }
.prog--session .prog__head:hover { background: var(--rose-soft); }
.prog__head:disabled { cursor: default; }
.prog__time { font-family: var(--display); font-style: italic; font-size: 20px; font-weight: 600; color: var(--accent); white-space: nowrap; letter-spacing: 0.04em; }
.prog__kind { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.18em; margin-bottom: 6px; }
.prog--minor .prog__kind { color: var(--ink-soft); font-weight: 600; }
.prog__t { font-family: var(--serif); font-size: 18px; font-weight: 600; line-height: 1.55; color: var(--ink); }
.prog--session .prog__t { font-size: 19px; }
.prog--minor .prog__t { font-size: 15px; color: var(--ink-mid); font-weight: 500; }
.prog__sub { font-size: 13.5px; color: var(--ink-mid); margin-top: 8px; font-style: italic; line-height: 1.6; }
.prog__host { font-size: 12.5px; color: var(--accent-deep); margin-top: 10px; font-weight: 600; }
.prog__chev { font-family: var(--sans); font-size: 26px; color: #fff; font-weight: 300; position: absolute; right: 24px; top: 50%; transform: translateY(-50%); width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.25s; box-shadow: 0 4px 16px rgba(176,74,94,0.3); line-height: 1; }
.prog__chev::after { content: ""; position: absolute; inset: -6px; border: 1px solid var(--rose); border-radius: 50%; opacity: 0.5; transition: all 0.25s; }
.prog--session .prog__head:hover .prog__chev { transform: translateY(-50%) scale(1.08); box-shadow: 0 8px 24px rgba(176,74,94,0.4); }
.prog--session .prog__head:hover .prog__chev::after { inset: -10px; opacity: 0; }
.prog.is-open .prog__chev { background: var(--ink); }
.prog { position: relative; }
.prog__body { padding: 0 16px 24px 156px; }
.prog__body ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.prog__body li { font-size: 13.5px; line-height: 1.8; padding-left: 22px; position: relative; color: var(--ink); }
.prog__body li::before { content: "\273F"; position: absolute; left: 0; color: var(--gold); font-size: 11px; top: 4px; }
.prog.is-open { background: var(--rose-soft); }

/* ── access ─────────────────────────── */
.access__table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(184,106,122,0.05); }
.access__table th, .access__table td { padding: 18px 24px; border-bottom: 1px solid var(--border-light); text-align: left; vertical-align: top; font-size: 14.5px; }
.access__table tr:last-child th, .access__table tr:last-child td { border-bottom: 0; }
.access__table th { width: 120px; font-weight: 500; color: var(--accent-deep); font-size: 13px; background: var(--rose-soft); letter-spacing: 0.04em; }
.access__table td small { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
.access__map-wrap { margin-top: 24px; }
.map { aspect-ratio: 16/9; position: relative; overflow: hidden; border: 1px solid var(--border); border-radius: 12px; background: var(--rose-soft); }
.map iframe { display: block; width: 100%; height: 100%; }
.map__placeholder { text-align: center; color: var(--ink-soft); font-size: 13px; }

/* ── apply ─────────────────────────── */
.apply { background: linear-gradient(180deg, var(--bg-soft) 0%, var(--rose-soft) 100%); padding: 72px 24px 80px; margin-top: 72px; position: relative; }
.apply__gform { display: flex; justify-content: center; margin-top: 16px; padding: 24px; background: var(--white); border-radius: 16px; box-shadow: 0 12px 40px rgba(184,106,122,0.12); border: 1px solid var(--border); }
.apply__gform iframe { width: 100%; max-width: 640px; border: 0; display: block; }
@media (max-width: 800px) {
  .apply__gform { padding: 12px; }
}

.apply::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
.apply__inner { max-width: var(--max); margin: 0 auto; }
.apply__grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 48px; align-items: start; }
.apply__h { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 20px; line-height: 1.6; color: var(--accent-deep); }
.apply__lead p { font-size: 14px; line-height: 1.9; margin-bottom: 18px; color: var(--ink); }
.apply__bullets { list-style: none; display: flex; flex-direction: column; gap: 8px; padding: 20px; background: rgba(255,255,255,0.6); border-radius: 8px; border-left: 2px solid var(--gold); }
.apply__bullets li { display: flex; gap: 10px; font-size: 13px; align-items: baseline; }
.apply__bullets li::before { content: "\273F"; color: var(--gold); font-size: 11px; flex-shrink: 0; }

.apply__form { background: var(--white); padding: 36px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 12px 40px rgba(184,106,122,0.12); }
.apply__steps { display: flex; gap: 10px; align-items: center; margin-bottom: 28px; font-size: 12px; color: var(--ink-soft); font-weight: 500; padding-bottom: 20px; border-bottom: 1px solid var(--border-light); }
.apply__steps .is-active { color: var(--accent); font-weight: 600; }

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 20px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field--full { grid-column: 1 / -1; }
.field__l { display: flex; gap: 8px; align-items: center; font-size: 12.5px; font-weight: 500; color: var(--ink); letter-spacing: 0.02em; }
.field__l em { font-size: 10px; padding: 2px 7px; background: var(--accent); color: #fff; border-radius: 999px; font-style: normal; font-weight: 500; letter-spacing: 0.06em; }
.field input, .field textarea { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font: inherit; font-size: 14px; color: var(--ink); transition: all 0.2s; background: var(--bg); }
.field textarea { resize: vertical; min-height: 90px; }
.field input:focus, .field textarea:focus { outline: 0; border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3px rgba(184,106,122,0.1); }
.field--error input, .field--error textarea { border-color: var(--accent); }
.field--readonly input, .field--readonly textarea { background: var(--bg-soft); color: var(--ink-soft); }

.checkbox { display: flex; gap: 12px; align-items: center; cursor: pointer; padding: 16px 0 24px; font-size: 13px; }
.checkbox input { display: none; }
.checkbox__box { width: 20px; height: 20px; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; color: var(--accent); background: var(--white); }
.checkbox a { color: var(--accent); text-decoration: underline; }
.checkbox.is-error .checkbox__box { border-color: var(--accent); }

.apply__cta-row { display: flex; justify-content: flex-end; gap: 12px; padding-top: 16px; border-top: 1px solid var(--border-light); }

.apply__done { text-align: center; padding: 48px 20px; }
.apply__done-mark { width: 64px; height: 64px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--accent); margin: 0 auto 24px; background: var(--rose-soft); }
.apply__done h3 { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 14px; color: var(--accent-deep); }
.apply__done p { color: var(--ink-soft); margin-bottom: 28px; font-size: 14px; line-height: 1.8; }

/* ── organizer ─────────────────────────── */
.organizer__inner { padding: 36px; background: var(--white); border-radius: 16px; border: 1px solid var(--border-light); text-align: center; box-shadow: 0 2px 12px rgba(184,106,122,0.05); }
.organizer__name { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 16px; color: var(--accent-deep); letter-spacing: 0.02em; }
.organizer__body { font-size: 14px; line-height: 1.9; color: var(--ink-soft); max-width: 560px; margin: 0 auto; }

/* ── footer ─────────────────────────── */
.foot { background: linear-gradient(135deg, var(--accent-deep) 0%, #5a2530 100%); color: #fdf8f5; margin-top: 80px; padding: 56px 24px 28px; position: relative; }
.foot::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
.foot__inner { max-width: 1100px; margin: 0 auto; }
.foot__brand { text-align: center; margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.15); }
.foot__brand-name { font-family: var(--display); font-style: italic; font-size: 36px; font-weight: 500; color: var(--gold); letter-spacing: 0.12em; margin-bottom: 8px; }
.foot__brand-jp { font-family: var(--serif); font-size: 13px; opacity: 0.65; letter-spacing: 0.18em; font-weight: 400; }
.foot__brand::before { content: ""; display: block; width: 40px; height: 1px; background: var(--gold); margin: 0 auto 20px; opacity: 0.6; }
.foot__cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; margin-bottom: 32px; }
.foot__cols dt { font-family: var(--display); font-style: italic; font-size: 13px; color: var(--gold); margin-bottom: 8px; letter-spacing: 0.1em; }
.foot__cols dd { font-size: 13px; line-height: 1.7; opacity: 0.85; }
.foot__cols a { transition: opacity 0.2s; }
.foot__cols a:hover { opacity: 0.6; }
.foot__rule { height: 1px; background: rgba(255,255,255,0.12); margin-bottom: 18px; }
.foot__base { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.5; letter-spacing: 0.04em; }

/* ── sticky CTA ─────────────────────────── */
.stickycta { position: fixed; bottom: 20px; left: 50%; transform: translate(-50%, 20px); display: flex; align-items: center; gap: 16px; padding: 10px 10px 10px 24px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%); color: #fff; border-radius: 999px; z-index: 90; opacity: 0; pointer-events: none; transition: all 0.35s; box-shadow: 0 10px 30px rgba(138,58,77,0.35); }
.stickycta.is-show { opacity: 1; pointer-events: auto; transform: translate(-50%, 0); }
.stickycta__l { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
.stickycta__l small { font-size: 11px; opacity: 0.8; margin-left: 10px; }
.stickycta__r { background: rgba(255,255,255,0.18); backdrop-filter: blur(8px); padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; }

/* ── modal (kept for Takeoka detail) ─────────────────────────── */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadein 0.2s; }

.modal__name { font-family: var(--serif); font-size: 22px; font-weight: 700; }

.modal__role { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.modal__close { font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; display: flex; gap: 6px; align-items: center; }
.modal__close:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.modal__tabs { display: flex; gap: 0; padding: 0 28px; border-bottom: 1px solid var(--border-light); position: sticky; top: 77px; background: var(--white); z-index: 1; }

function SectionHead({ kicker, title, sub }) {
  return (
    <div className="section__head">
      {kicker && <span className="section__kicker">{kicker}</span>}
      <h2 className="section__title" dangerouslySetInnerHTML={{__html: title}} />
      <div className="section__divider"></div>
      {sub && <p className="section__sub">{sub}</p>}
    </div>
  );
}

function Lead() {
  return (
    <section className="lead" id="about">
      <SectionHead kicker="About the Seminar" title='なぜ今、<span class="section__title-accent">このセミナーなのか</span>' sub="本セミナーの背景と、得られる価値について" />
      <div className="lead__text">
        <p>
          成分名だけで売れる時代は終わりました。しかし「成分で信じられる理由」は、売れ続ける化粧品の根幹であり続けています。
        </p>
        <p>
          本セミナーでは、成分の<strong>発掘</strong>（次に何が来るか）と<strong>訴求</strong>（どう売るか）の両輪を、2時間で接続します。大手メーカーのブランド・商品開発担当者に向けた、業界の最前線を更新するプログラムです。
        </p>
      </div>

      <div className="target" style={{marginTop: "56px"}}>
        <h3 className="target__title">こんな方におすすめのセミナーです</h3>
        <ul className="target__list">
          <li>化粧品メーカーのブランドマネージャー・商品企画担当者</li>
          <li>次の商品開発で「成分訴求」の方向性を見直したい方</li>
          <li>in-cosmetics等のグローバルトレンドを自社の企画に活かしたい方</li>
          <li>ヒット商品の成分マーケティング事例を構造的に学びたい方</li>
          <li>成分の発掘から訴求設計までを一気通貫で考えたい方</li>
        </ul>
      </div>
    </section>
  );
}

function Benefits() {
  return (
    <section className="section">
      <SectionHead kicker="What You'll Take Home" title="セミナーで<span class='section__title-accent'>持ち帰れる5つの視点</span>" sub="翌朝の企画会議で、すぐに使える知見をお持ち帰りいただきます。" />
      <div className="benefits__list">
        {BENEFITS.map(b => (
          <article key={b.num} className="benefit">
            <div className="benefit__head">
              <div className="benefit__icon">{b.icon}</div>
              <div className="benefit__num">{b.num}<small>{b.label}</small></div>
            </div>
            <div className="benefit__body">
              <h3 className="benefit__t">{b.title}</h3>
              <p className="benefit__b">{b.body}</p>
              {b.tags && (
                <div className="benefit__tags">
                  {b.tags.map((t, i) => <span key={i} className="benefit__tag">#{t}</span>)}
                </div>
              )}
            </div>
          </article>
        ))}
      </div>
    </section>
  );
}

            <h3 className="speaker__name">竹岡 篤史</h3>
            <div className="speaker__name-en">Atsushi Takeoka</div>
            <p className="speaker__bio">国立研究所でペプチドを用いた経皮ワクチンの開発に従事した後、企業でスキンケア成分専科部門を立ち上げ、成分開発を主導。in-cosmeticsイノベーションアワード金賞を3度受賞、2016年はアジアから初の金賞受賞となった。</p>
            <ul className="speaker__highlights">
              <li>2016 in-cosmetics Innovation Award 金賞（アジア初受賞）</li>
              <li>2020 in-cosmetics Innovation Award 金賞（再生オイル）</li>
              <li>2023 in-cosmetics Innovation Award 金賞（清酒由来発酵ペプチド）</li>

function TakeokaModal({ open, onClose }) {
  const [tab, setTab] = useState("awards");
  useEffect(() => {
    if (!open) return;
    const k = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", k);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", k); document.body.style.overflow = ""; };
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div className="modal" onClick={onClose}>
      <div className="modal__sheet" onClick={e => e.stopPropagation()}>
        <header className="modal__head">
          <div>
            <h3 className="modal__name">竹岡 篤史 <span>Atsushi Takeoka</span></h3>
            <p className="modal__role">美容成分研究家 ／ スキンケア成分ハンター</p>
          </div>
          <button className="modal__close" onClick={onClose}>閉じる <span>&times;</span></button>
        </header>

        <nav className="modal__tabs">
          {[
            { id: "awards", label: "受賞歴" },
            { id: "media", label: "メディア掲載" },
            { id: "video", label: "動画" }
          ].map(t => (
            <button key={t.id} className={"modal__tab" + (tab === t.id ? " is-active" : "")} onClick={() => setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </nav>

        <div className="modal__body">
          {tab === "awards" && (
            <div>
              <div className="awards">
                {[
                  { y: "2016", title: "in-cosmetics Innovation Award 金賞", note: "アジアから初の金賞受賞。スキンケア成分の世界水準を更新した。" },
                  { y: "2020", title: "in-cosmetics Innovation Award 金賞", note: "再生オイルにおける革新性が評価され、2度目の金賞受賞。" },
                  { y: "2023", title: "in-cosmetics Innovation Award 金賞", note: "清酒由来発酵ペプチド。日本由来素材の機能性を科学的に証明し、3度目の金賞受賞。" }
                ].map((a, i) => (
                  <div key={i} className="award">
                    <div className="award__y">{a.y}</div>
                    <div>
                      <div className="award__t">{a.title}</div>
                      <p className="award__n">{a.note}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === "media" && (
            <div>
              <p className="modal__note">業界メディア・Web媒体での取材記事・寄稿。</p>
              <ul className="medialist">
                {[
                  { url: "https://www.wwdjapan.com/articles/2269867", source: "WWDJAPAN", date: "記事 ↗", title: "化粧品研究開発のプロ・竹岡篤史氏から見た、『無印良品』化粧品の実力" },
                  { url: "https://www.wwdjapan.com/articles/1833756", source: "WWDJAPAN", date: "記事 ↗", title: "「成分トレンド」で注目度増す！ 今、なぜ「ペプチド」なのか？" },
                  { url: "https://mi-mollet.com/articles/-/48571", source: "mi-mollet", date: "インタビュー ↗", title: "化粧品成分ハンターが選ぶ「スキンケアを変えるならこの１本」。美白・UVケアの最前線" },

      <span className="field__l">
        <span>{label}</span>

      {textarea ? (
        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} disabled={readonly} />

  );
